name: Build & publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Đăng nhập GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Image name PHẢI viết thường (GHCR yêu cầu)
          tags: |
            ghcr.io/duonggfi/koohat:latest
            ghcr.io/duonggfi/koohat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
