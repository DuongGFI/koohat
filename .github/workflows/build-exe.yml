name: Build Windows .exe

# Build file .exe trên máy Windows mỗi khi đẩy code lên main (hoặc chạy tay).
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "media/**"
      - "docker-compose.yml"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write # cần để tạo/cập nhật Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cài công cụ build esbuild và pkg
        run: npm install

      - name: Cài dependencies cho server + client
        run: npm run install:all

      - name: Build client + nhúng dist + gộp bundle CJS
        run: npm run exe:prep

      - name: Tạo blob SEA
        run: node --experimental-sea-config sea-config.json

      - name: Tạo koohat.exe (node.exe + inject blob)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-exe | Out-Null
          Copy-Item (Get-Command node).Source dist-exe/koohat.exe
          npx --yes postject dist-exe/koohat.exe NODE_SEA_BLOB build/sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Kiểm tra nhanh koohat.exe (boot + health)
        shell: pwsh
        run: |
          $env:PORT = "1239"
          $p = Start-Process -FilePath dist-exe/koohat.exe -PassThru
          Start-Sleep -Seconds 6
          try {
            $r = Invoke-RestMethod -Uri "http://127.0.0.1:1239/api/health" -TimeoutSec 8
            if (-not $r.ok) { throw "health không ok" }
            Write-Host "OK: exe chạy được, health = $($r | ConvertTo-Json -Compress)"
          } finally {
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload file .exe lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koohat-windows
          path: dist-exe/koohat.exe
          if-no-files-found: error
          retention-days: 30

      - name: Phát hành lên Releases (tag latest)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Koohat - bản mới nhất
          body: |
            Tải **koohat.exe** rồi bấm đúp để chơi (Windows, không cần cài gì).
            File được build & test tự động trên Windows runner.
          files: |
            dist-exe/koohat.exe
            build/koohat.cjs
          make_latest: true
